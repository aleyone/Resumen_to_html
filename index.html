<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visor Novedades</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f8f7f4;--surface:#fff;--surface2:#f2f1ee;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.14);
  --text:#1a1917;--text2:#6b6a66;--text3:#9b9a96;
  --accent:#2563eb;--accent-bg:#eff6ff;
  --warn-bg:#fffbeb;--warn-border:#fcd34d;--warn-text:#92400e;
  --radius:8px;--sidebar-w:290px;
  --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#141412;--surface:#1e1d1a;--surface2:#272622;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.13);
  --text:#f0ede8;--text2:#9a9790;--text3:#65635e;
  --accent:#60a5fa;--accent-bg:#1e2a3a;
  --warn-bg:#2a1f0a;--warn-border:#78450a;--warn-text:#fbbf24;
}}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);}
#topbar{height:52px;min-height:52px;display:flex;align-items:center;gap:8px;padding:0 14px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.logo{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;white-space:nowrap;}
.logo-dot{width:26px;height:26px;border-radius:6px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:700;}
.tb-sep{width:1px;height:20px;background:var(--border2);flex-shrink:0;margin:0 2px;}
#filters{display:flex;align-items:center;gap:6px;flex:1;flex-wrap:wrap;}
select.fs{padding:5px 8px;font-size:12px;font-family:var(--font);background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);outline:none;cursor:pointer;max-width:200px;}
select.fs:focus{border-color:var(--accent);}
.tb-count{font-size:12px;color:var(--text3);white-space:nowrap;margin-left:auto;}
#loading{display:none;position:fixed;inset:0;background:var(--bg);flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:10;}
#loading.on{display:flex;}
.spinner{width:32px;height:32px;border:2.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#load-msg{font-size:14px;color:var(--text2);}
#empty-state{display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;height:calc(100vh - 52px);color:var(--text3);font-size:14px;}
#empty-state.on{display:flex;}
#app{display:none;height:calc(100vh - 52px);}
#app.on{display:flex;}
#sidebar{width:var(--sidebar-w);min-width:220px;border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
#sb-search{padding:8px 10px;border-bottom:1px solid var(--border);}
#sb-search input{width:100%;padding:6px 10px;font-size:13px;font-family:var(--font);background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);outline:none;}
#sb-search input:focus{border-color:var(--accent);}
#sb-counter{padding:6px 14px 3px;font-size:10px;color:var(--text3);font-weight:600;letter-spacing:0.05em;text-transform:uppercase;}
#req-list{overflow-y:auto;flex:1;}
#req-list::-webkit-scrollbar{width:4px;}
#req-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.comp-header{display:flex;align-items:center;gap:6px;padding:8px 12px 6px;cursor:pointer;user-select:none;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1;}
.comp-header:hover{background:var(--surface2);}
.comp-arrow{font-size:10px;color:var(--text3);transition:transform 0.15s;flex-shrink:0;display:inline-block;}
.comp-arrow.open{transform:rotate(90deg);}
.comp-name{font-size:11px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--text2);flex:1;}
.comp-count{font-size:10px;color:var(--text3);background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:1px 6px;}
.comp-items{display:none;}
.comp-items.open{display:block;}
.req-item{padding:8px 14px 8px 20px;cursor:pointer;border-left:3px solid transparent;transition:background 0.12s;border-bottom:1px solid var(--border);}
.req-item:hover{background:var(--surface2);}
.req-item.active{border-left-color:var(--accent);background:var(--accent-bg);}
.ri-id{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;}
.ri-name{font-size:12px;color:var(--text);margin-top:2px;line-height:1.4;}
.ri-date{font-size:10px;color:var(--text3);margin-top:3px;}
#content{flex:1;overflow-y:auto;padding:32px 40px;background:var(--bg);}
#content::-webkit-scrollbar{width:5px;}
#content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
#content.empty{display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:14px;}
.ci{max-width:780px;}
.dh{margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.dh-id{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;}
.dh-title{font-size:21px;font-weight:600;color:var(--text);line-height:1.3;}
.dh-tags{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center;}
.comp-tag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:4px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);}
.date-tag{font-size:11px;color:var(--text3);padding:3px 8px;border-radius:4px;background:var(--surface2);border:1px solid var(--border2);}
.resumen-box{background:var(--accent-bg);border:1px solid rgba(37,99,235,0.2);border-radius:var(--radius);padding:14px 18px;margin-bottom:22px;font-size:14px;color:var(--text);line-height:1.75;}
.resumen-label{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}
.sec{margin-bottom:22px;}
.sec-label{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:600;letter-spacing:0.09em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;}
.sec-body{font-size:14px;color:var(--text);line-height:1.8;}
.sec-body p{margin-bottom:10px;}
.sec-body p:last-child{margin-bottom:0;}
.sec-body code{font-family:var(--mono);font-size:12px;background:var(--surface2);padding:1px 6px;border-radius:4px;border:1px solid var(--border2);}
.gallery-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}

/* ── CHAT PANEL ── */
#chat-fab{
  position:fixed;bottom:24px;right:24px;z-index:50;
  width:48px;height:48px;border-radius:50%;
  background:var(--accent);color:white;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:20px;
  box-shadow:0 4px 14px rgba(37,99,235,0.4);transition:transform 0.15s,opacity 0.15s;
}
#chat-fab:hover{transform:scale(1.08);}
#chat-fab.open{background:var(--surface2);color:var(--text2);box-shadow:0 2px 8px rgba(0,0,0,0.12);}

#chat-panel{
  position:fixed;top:52px;right:0;bottom:0;z-index:40;
  width:400px;max-width:100vw;
  background:var(--surface);border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform 0.25s ease;
  box-shadow:-4px 0 20px rgba(0,0,0,0.08);
}
#chat-panel.open{transform:translateX(0);}

#chat-header{
  padding:14px 16px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.chat-title{font-size:14px;font-weight:600;color:var(--text);flex:1;}
.chat-subtitle{font-size:11px;color:var(--text3);}

#chat-filters{
  padding:10px 14px;border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;gap:7px;flex-shrink:0;
  background:var(--surface2);
}
.cf-row{display:flex;align-items:center;gap:8px;}
.cf-label{font-size:11px;color:var(--text3);font-weight:500;width:70px;flex-shrink:0;}
select.cf-sel{
  flex:1;padding:5px 8px;font-size:12px;font-family:var(--font);
  background:var(--surface);border:1px solid var(--border2);
  border-radius:var(--radius);color:var(--text);outline:none;
}
select.cf-sel:focus{border-color:var(--accent);}
.cf-check{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);cursor:pointer;}
.cf-check input{accent-color:var(--accent);cursor:pointer;}

#chat-messages{
  flex:1;overflow-y:auto;padding:14px;
  display:flex;flex-direction:column;gap:12px;
}
#chat-messages::-webkit-scrollbar{width:4px;}
#chat-messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

.chat-msg{display:flex;flex-direction:column;gap:4px;max-width:92%;}
.chat-msg.user{align-self:flex-end;align-items:flex-end;}
.chat-msg.assistant{align-self:flex-start;align-items:flex-start;}
.msg-bubble{
  padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.65;
}
.chat-msg.user .msg-bubble{
  background:var(--accent);color:white;border-bottom-right-radius:4px;
}
.chat-msg.assistant .msg-bubble{
  background:var(--surface2);color:var(--text);border:1px solid var(--border);
  border-bottom-left-radius:4px;
}
.msg-bubble p{margin-bottom:8px;}
.msg-bubble p:last-child{margin-bottom:0;}
.msg-refs{display:flex;flex-direction:column;gap:3px;margin-top:6px;}
.msg-ref{
  font-size:10px;color:var(--text3);background:var(--surface2);
  border:1px solid var(--border);border-radius:4px;
  padding:2px 8px;display:inline-flex;align-items:center;gap:4px;
}
.msg-ref-comp{font-weight:600;color:var(--accent);}

.chat-thinking{
  align-self:flex-start;padding:10px 14px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;border-bottom-left-radius:4px;
  font-size:13px;color:var(--text3);
  display:flex;align-items:center;gap:8px;
}
.dots span{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--text3);animation:dot-pulse 1.2s infinite;
}
.dots span:nth-child(2){animation-delay:0.2s;}
.dots span:nth-child(3){animation-delay:0.4s;}
@keyframes dot-pulse{0%,80%,100%{opacity:0.3;transform:scale(0.8);}40%{opacity:1;transform:scale(1);}}

.chat-empty{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;color:var(--text3);font-size:13px;
  text-align:center;padding:20px;
}
.chat-empty-icon{font-size:32px;opacity:0.4;}

#chat-input-area{
  padding:12px 14px;border-top:1px solid var(--border);
  display:flex;gap:8px;align-items:flex-end;flex-shrink:0;
  background:var(--surface);
}
#chat-input{
  flex:1;padding:9px 12px;font-size:13px;font-family:var(--font);
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--radius);color:var(--text);outline:none;
  resize:none;max-height:100px;min-height:38px;line-height:1.5;
}
#chat-input:focus{border-color:var(--accent);}
#chat-send{
  width:36px;height:36px;border-radius:var(--radius);
  background:var(--accent);color:white;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:15px;
  flex-shrink:0;transition:opacity 0.15s;
}
#chat-send:hover{opacity:0.88;}
#chat-send:disabled{opacity:0.4;cursor:default;}
#chat-clear{
  font-size:11px;color:var(--text3);cursor:pointer;
  padding:4px 8px;border-radius:4px;border:1px solid var(--border2);
  background:none;flex-shrink:0;
}
#chat-clear:hover{background:var(--surface2);}
.gallery-thumb{width:120px;height:80px;border-radius:var(--radius);border:1px solid var(--border2);object-fit:cover;cursor:pointer;transition:transform 0.15s,border-color 0.15s;background:var(--surface2);}
.gallery-thumb:hover{transform:scale(1.04);border-color:var(--accent);}
/* nav top */
.nav-top{display:flex;gap:8px;margin-bottom:20px;}
.nav-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;font-size:12px;font-family:var(--font);cursor:pointer;color:var(--text2);border:1px solid var(--border2);background:var(--surface);border-radius:var(--radius);transition:background 0.15s;max-width:44%;overflow:hidden;}
.nav-btn:hover:not([disabled]){background:var(--surface2);}
.nav-btn[disabled]{opacity:0.35;cursor:default;pointer-events:none;}
.nav-btn.next{margin-left:auto;justify-content:flex-end;}
.nav-btn span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px;}
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
#lightbox.on{display:flex;}
#lb-img{max-width:90vw;max-height:80vh;border-radius:var(--radius);object-fit:contain;}
#lb-counter{font-size:13px;color:rgba(255,255,255,0.6);}
#lb-close{position:fixed;top:16px;right:20px;font-size:28px;color:white;cursor:pointer;opacity:0.7;background:none;border:none;}
.lb-arrow{position:fixed;top:50%;transform:translateY(-50%);font-size:32px;color:white;cursor:pointer;opacity:0.6;background:none;border:none;padding:12px;}
#lb-prev{left:12px;}#lb-next{right:12px;}
</style>
</head>
<body>
<div id="topbar">
  <div class="logo"><div class="logo-dot">G</div> Visor Novedades</div>
  <div class="tb-sep"></div>
  <div id="filters">
    <select class="fs" id="f-app" onchange="onFilterChange()"><option value="">Todas las apps</option></select>
    <select class="fs" id="f-version" onchange="onVersionChange()"><option value="">Todas las versiones</option></select>
    <select class="fs" id="f-component" onchange="onComponentFilter()"><option value="">Todos los componentes</option></select>
    <span class="tb-count" id="tb-count"></span>
  </div>
</div>
<div id="loading"><div class="spinner"></div><div id="load-msg">Cargando...</div></div>
<div id="empty-state"><div style="font-size:40px">📭</div><div>No hay despliegues publicados todavía.</div></div>
<div id="app">
  <div id="sidebar">
    <div id="sb-search"><input type="text" id="sb-input" placeholder="Buscar requerimiento..."></div>
    <div id="sb-counter"></div>
    <div id="req-list"></div>
  </div>
  <div id="content" class="empty"><span>&#8592; Selecciona un requerimiento</span></div>
</div>
<div id="lightbox" onclick="lbBg(event)">
  <button id="lb-close" onclick="lbClose()">&#215;</button>
  <button class="lb-arrow" id="lb-prev" onclick="lbNav(-1);event.stopPropagation()">&#8249;</button>
  <img id="lb-img" src="" alt="">
  <div id="lb-counter"></div>
  <button class="lb-arrow" id="lb-next" onclick="lbNav(1);event.stopPropagation()">&#8250;</button>
</div>
<script>
var currentReqs=[], currentIdx=-1, lbImages=[], lbIdx=0, activeComp='';
var allDeployments=[];

document.getElementById('sb-input').addEventListener('input', function(){ renderSidebar(this.value); });

// ── Bootstrap: load all deployments metadata first ──
async function init() {
  document.getElementById('loading').className='on';
  try {
    var resp = await fetch('/api/deployments');
    var data = await resp.json();
    allDeployments = data.deployments || [];
    populateAppFilter();
    if (!allDeployments.length) {
      document.getElementById('empty-state').className='on';
      return;
    }
    // Auto-select first app and version
    var firstApp = allDeployments[0].app;
    var firstVersion = allDeployments[0].version;
    document.getElementById('f-app').value = firstApp;
    populateVersionFilter(firstApp);
    document.getElementById('f-version').value = firstVersion;
    await loadDeployment(firstApp, firstVersion);
  } catch(e) {
    document.getElementById('load-msg').textContent = 'Error: ' + e.message;
  } finally {
    document.getElementById('loading').className='';
  }
}

function populateAppFilter() {
  var apps = [];
  allDeployments.forEach(function(d){ if (apps.indexOf(d.app) === -1) apps.push(d.app); });
  var sel = document.getElementById('f-app');
  sel.innerHTML = '<option value="">Todas las apps</option>';
  apps.forEach(function(a){
    var o = document.createElement('option');
    o.value = a; o.textContent = a;
    sel.appendChild(o);
  });
}

function populateVersionFilter(app) {
  var sel = document.getElementById('f-version');
  sel.innerHTML = '<option value="">Todas las versiones</option>';
  var versions = [];
  allDeployments.forEach(function(d){
    if ((!app || d.app === app) && versions.indexOf(d.version) === -1) versions.push(d.version);
  });
  versions.forEach(function(v){
    var o = document.createElement('option');
    o.value = v; o.textContent = v;
    sel.appendChild(o);
  });
}

function populateComponentFilter(reqs) {
  var comps = [];
  reqs.forEach(function(r){
    var c = r.component || 'Sin componente';
    if (comps.indexOf(c) === -1) comps.push(c);
  });
  comps.sort();
  var sel = document.getElementById('f-component');
  sel.innerHTML = '<option value="">Todos los componentes</option>';
  comps.forEach(function(c){
    var o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  });
}

async function onFilterChange() {
  var app = document.getElementById('f-app').value;
  // Reset dependent filters when app changes
  document.getElementById('f-version').value = '';
  document.getElementById('f-component').value = '';
  activeComp = '';
  populateVersionFilter(app);
  await loadDeployment(app, '');
}

async function onVersionChange() {
  var app = document.getElementById('f-app').value;
  var version = document.getElementById('f-version').value;
  document.getElementById('f-component').value = '';
  activeComp = '';
  await loadDeployment(app, version);
}

function onComponentFilter() {
  renderSidebar('');
  var visible = getVisible('');
  if (visible.length) selectReq(visible[0]._idx);
}

async function loadDeployment(app, version) {
  document.getElementById('loading').className='on';
  try {
    var url = '/api/deployments?full=1';
    if (app) url += '&app=' + encodeURIComponent(app);
    if (version) url += '&version=' + encodeURIComponent(version);
    var resp = await fetch(url);
    var data = await resp.json();
    var deps = data.deployments || [];
    if (!deps.length) {
      document.getElementById('empty-state').className='on';
      document.getElementById('app').className='';
      return;
    }
    document.getElementById('empty-state').className='';

    // Combine requirements from ALL matching deployments, re-number globally
    var allReqs = [];
    var globalIdx = 0;
    deps.forEach(function(dep) {
      (dep.requirements || []).forEach(function(r) {
        var newId = 'REQ-' + String(globalIdx + 1).padStart(2, '0');
        allReqs.push(Object.assign({}, r, { _idx: globalIdx, id: newId }));
        globalIdx++;
      });
    });
    currentReqs = allReqs;

    populateComponentFilter(currentReqs);
    document.getElementById('tb-count').textContent = currentReqs.length + ' reqs \u00b7 ' + deps[0].app + ' ' + deps[0].version;
    document.getElementById('app').className='on';
    activeComp = '';
    renderSidebar('');
    if (currentReqs.length) selectReq(0);
  } catch(e) {
    document.getElementById('load-msg').textContent = 'Error: ' + e.message;
  } finally {
    document.getElementById('loading').className='';
  }
}

function getVisible(filter) {
  var reqs = currentReqs;
  if (activeComp) reqs = reqs.filter(function(r){ return (r.component || 'Sin componente') === activeComp; });
  if (filter) {
    var f = filter.toLowerCase();
    reqs = reqs.filter(function(r){ return (r.title + r.id + (r.component || '')).toLowerCase().indexOf(f) !== -1; });
  }
  return reqs;
}

function renderSidebar(filter) {
  var visible = getVisible(filter);
  document.getElementById('sb-counter').textContent = visible.length + ' requerimientos';

  // Group by component
  var groups = {};
  var groupOrder = [];
  visible.forEach(function(r){
    var c = r.component || 'Sin componente';
    if (!groups[c]) { groups[c] = []; groupOrder.push(c); }
    groups[c].push(r);
  });

  if (!visible.length) {
    document.getElementById('req-list').innerHTML = '<div style="padding:16px;font-size:13px;color:var(--text3)">Sin resultados</div>';
    return;
  }

  var html = '';
  groupOrder.forEach(function(comp){
    var reqs = groups[comp];
    var isOpen = !activeComp || activeComp === comp;
    var safeId = comp.replace(/[^a-zA-Z0-9]/g, '_');
    var itemsHtml = '';
    reqs.forEach(function(r){
      var active = r._idx === currentIdx ? ' active' : '';
      var dateHtml = r.req_date ? '<div class="ri-date">' + r.req_date + '</div>' : '';
      itemsHtml += '<div class="req-item' + active + '" id="ritem-' + r._idx + '" onclick="selectReq(' + r._idx + ')">' +
        '<div class="ri-id">' + r.id + '</div>' +
        '<div class="ri-name">' + esc(cleanTitle(r.title)) + '</div>' +
        dateHtml +
        '</div>';
    });
    var arrowClass = isOpen ? 'comp-arrow open' : 'comp-arrow';
    var itemsClass = isOpen ? 'comp-items open' : 'comp-items';
    html += '<div class="comp-group" id="cgroup-' + safeId + '">' +
      '<div class="comp-header" onclick="toggleGroup(this)">' +
        '<span class="' + arrowClass + '">&#9654;</span>' +
        '<span class="comp-name">' + comp + '</span>' +
        '<span class="comp-count">' + reqs.length + '</span>' +
      '</div>' +
      '<div class="' + itemsClass + '">' + itemsHtml + '</div>' +
      '</div>';
  });
  document.getElementById('req-list').innerHTML = html;
}

function toggleGroup(header) {
  var arrow = header.querySelector('.comp-arrow');
  var items = header.nextElementSibling;
  var open = items.classList.contains('open');
  arrow.classList.toggle('open', !open);
  items.classList.toggle('open', !open);
}

function cleanTitle(title) {
  // Remove bracket prefixes: [GVMEGAIA-27207] GAIA-523 [MPRE3] → real title
  return (title || '').replace(/^(\[[^\]]*\]\s*)+(GAIA-\d+\s*|SIA-\d+\s*)?/i, '').trim() || title || '';
}

function selectReq(idx) {
  currentIdx = idx;
  document.querySelectorAll('.req-item').forEach(function(el){ el.classList.remove('active'); });
  var it = document.getElementById('ritem-' + idx);
  if (it) { it.classList.add('active'); it.scrollIntoView({block:'nearest'}); }
  var r = currentReqs[idx];
  if (!r) return;
  var panel = document.getElementById('content');
  panel.className = '';
  var comp = r.component || 'Sin componente';
  var displayTitle = cleanTitle(r.title);

  // Nav — contextual within component (at TOP)
  var compReqs = currentReqs.filter(function(x){ return (x.component || 'Sin componente') === comp; });
  var pos = compReqs.findIndex(function(x){ return x._idx === idx; });
  var prev = compReqs[pos - 1], next = compReqs[pos + 1];
  var prevLabel = prev ? (cleanTitle(prev.title)) : 'Anterior';
  var nextLabel = next ? (cleanTitle(next.title)) : 'Siguiente';

  var html = '<div class="ci">';
  // Nav top
  html += '<div class="nav-top">' +
    '<button class="nav-btn"' + (prev ? '' : ' disabled') + ' onclick="selectReq(' + (prev ? prev._idx : -1) + ')">' +
      '&#8592; <span>' + esc(prevLabel) + '</span></button>' +
    '<button class="nav-btn next"' + (next ? '' : ' disabled') + ' onclick="selectReq(' + (next ? next._idx : -1) + ')">' +
      '<span>' + esc(nextLabel) + '</span> &#8594;</button>' +
    '</div>';

  // Header
  var dateTagHtml = r.req_date ? '<span class="date-tag">&#128197; ' + r.req_date + '</span>' : '';
  html += '<div class="dh"><div class="dh-id">' + r.id + '</div><div class="dh-title">' + esc(displayTitle) + '</div>' +
    '<div class="dh-tags"><span class="comp-tag">' + esc(comp) + '</span>' + dateTagHtml + '</div></div>';

  // Resumen box removed — only situacion_actual and descripcion
  if (r.situacion_actual) html += mkSec('&#128336;', 'Situaci&oacute;n actual', '<div class="sec-body">' + fmtP(r.situacion_actual) + '</div>');
  if (r.descripcion) html += mkSec('&#128196;', 'Descripci&oacute;n del cambio', '<div class="sec-body">' + fmtP(r.descripcion) + '</div>');

  // Images
  var imgs = (r.images || []).filter(Boolean);
  if (imgs.length) {
    var thumbs = imgs.map(function(src, i){
      return '<img class="gallery-thumb" src="' + src + '" alt="Captura ' + (i+1) + '" loading="lazy" onclick="openLb(' + idx + ',' + i + ')">';
    }).join('');
    html += mkSec('&#128444;', 'Capturas (' + imgs.length + ')', '<div class="gallery-strip">' + thumbs + '</div>');
  }

  html += '</div>';
  panel.innerHTML = html;
  panel.scrollTop = 0;
}

function mkSec(icon, label, body) {
  return '<div class="sec"><div class="sec-label">' + icon + ' ' + label + '</div>' + body + '</div>';
}
function fmtP(txt) {
  if (!txt) return '';
  return txt.split('\n').filter(function(l){ return l.trim(); }).map(function(l){ return '<p>' + esc(l.trim()) + '</p>'; }).join('');
}
function mkTable(t) {
  var thead = '<tr>' + t.cabeceras.map(function(h){ return '<th>' + esc(h) + '</th>'; }).join('') + '</tr>';
  var tbody = t.filas.map(function(row){
    var cells = Array.isArray(row) ? row : [row];
    return '<tr>' + cells.map(function(c){ return '<td>' + esc(c || '') + '</td>'; }).join('') + '</tr>';
  }).join('');
  return '<div class="tw"><table class="dt"><thead>' + thead + '</thead><tbody>' + tbody + '</tbody></table></div>';
}
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function trunc(str, n) { return str && str.length > n ? str.slice(0, n) + '\u2026' : (str || ''); }

// Lightbox
function openLb(rIdx, iIdx) {
  var r = currentReqs[rIdx];
  lbImages = (r.images || []).filter(Boolean);
  lbIdx = iIdx;
  updLb();
  document.getElementById('lightbox').className = 'on';
  document.addEventListener('keydown', lbKey);
}
function updLb() {
  document.getElementById('lb-img').src = lbImages[lbIdx];
  document.getElementById('lb-counter').textContent = (lbIdx + 1) + ' / ' + lbImages.length;
  document.getElementById('lb-prev').style.display = lbIdx > 0 ? 'block' : 'none';
  document.getElementById('lb-next').style.display = lbIdx < lbImages.length - 1 ? 'block' : 'none';
}
function lbNav(dir) { lbIdx = Math.max(0, Math.min(lbImages.length - 1, lbIdx + dir)); updLb(); }
function lbClose() { document.getElementById('lightbox').className = ''; document.removeEventListener('keydown', lbKey); }
function lbBg(e) { if (e.target === document.getElementById('lightbox')) lbClose(); }
function lbKey(e) { if (e.key === 'Escape') lbClose(); if (e.key === 'ArrowLeft') lbNav(-1); if (e.key === 'ArrowRight') lbNav(1); }

init();
</script>
<!-- CHAT FAB -->
<button id="chat-fab" onclick="toggleChat()" title="Asistente CAU">&#128172;</button>

<!-- CHAT PANEL -->
<div id="chat-panel">
  <div id="chat-header">
    <div>
      <div class="chat-title">&#128172; Asistente CAU</div>
      <div class="chat-subtitle">Consulta sobre requerimientos</div>
    </div>
    <button id="chat-clear" onclick="clearChat()">Limpiar</button>
  </div>
  <div id="chat-filters">
    <div class="cf-row">
      <span class="cf-label">Aplicación</span>
      <select class="cf-sel" id="cf-app"><option value="">Todas</option></select>
    </div>
    <div class="cf-row">
      <span class="cf-label">Componente</span>
      <select class="cf-sel" id="cf-comp"><option value="">Todos</option></select>
    </div>
    <label class="cf-check">
      <input type="checkbox" id="cf-last" checked>
      Buscar solo en la última versión
    </label>
  </div>
  <div id="chat-messages">
    <div class="chat-empty">
      <div class="chat-empty-icon">&#129302;</div>
      <div>Haz una pregunta sobre los requerimientos publicados.</div>
      <div style="font-size:11px;color:var(--text3)">Usa los filtros para acotar la búsqueda.</div>
    </div>
  </div>
  <div id="chat-input-area">
    <textarea id="chat-input" placeholder="Escribe tu pregunta..." rows="1"
      oninput="autoResize(this)"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}"></textarea>
    <button id="chat-send" onclick="sendChat()">&#10148;</button>
  </div>
</div>

<script>
// ── CHAT ──
var chatHistory = []; // [{role, content}]
var chatOpen = false;

function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chat-panel').classList.toggle('open', chatOpen);
  document.getElementById('chat-fab').classList.toggle('open', chatOpen);
  if (chatOpen) {
    syncChatFilters();
    document.getElementById('chat-input').focus();
  }
}

function syncChatFilters() {
  // Sync app filter from main filters
  var appSel = document.getElementById('f-app');
  var cfApp = document.getElementById('cf-app');
  // Populate cf-app from allDeployments
  var apps = [];
  allDeployments.forEach(function(d){ if (apps.indexOf(d.app) === -1) apps.push(d.app); });
  cfApp.innerHTML = '<option value="">Todas</option>';
  apps.forEach(function(a){
    var o = document.createElement('option');
    o.value = a; o.textContent = a;
    if (appSel.value === a) o.selected = true;
    cfApp.appendChild(o);
  });
  updateChatComponents();
}

function updateChatComponents() {
  var app = document.getElementById('cf-app').value;
  var cfComp = document.getElementById('cf-comp');
  var comps = [];
  // Filter deployments by selected app, collect unique components
  allDeployments.forEach(function(d){
    if (app && d.app !== app) return;
    // Get components from current loaded requirements if same app/version
    // Otherwise use component info from deployments metadata
    if (d.component) {
      if (comps.indexOf(d.component) === -1) comps.push(d.component);
    }
  });
  // Also check currentReqs if they match the selected app
  currentReqs.forEach(function(r){
    var c = r.component;
    if (c && c !== 'Sin componente' && comps.indexOf(c) === -1) comps.push(c);
  });
  comps.sort();
  cfComp.innerHTML = '<option value="">Todos</option>';
  comps.forEach(function(c){
    var o = document.createElement('option');
    o.value = c; o.textContent = c;
    cfComp.appendChild(o);
  });
}

document.getElementById('cf-app').addEventListener('change', updateChatComponents);

function clearChat() {
  chatHistory = [];
  var msgs = document.getElementById('chat-messages');
  msgs.innerHTML = '<div class="chat-empty"><div class="chat-empty-icon">&#129302;</div><div>Haz una pregunta sobre los requerimientos publicados.</div><div style="font-size:11px;color:var(--text3)">Usa los filtros para acotar la búsqueda.</div></div>';
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function addMsg(role, content, refs) {
  var msgs = document.getElementById('chat-messages');
  // Remove empty state
  var empty = msgs.querySelector('.chat-empty');
  if (empty) empty.remove();

  var div = document.createElement('div');
  div.className = 'chat-msg ' + role;

  var bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  // Format content as paragraphs
  bubble.innerHTML = content.split('\n').filter(function(l){ return l.trim(); })
    .map(function(l){ return '<p>' + l.trim() + '</p>'; }).join('');
  div.appendChild(bubble);

  if (refs && refs.length) {
    var refsDiv = document.createElement('div');
    refsDiv.className = 'msg-refs';
    refs.forEach(function(r){
      var span = document.createElement('span');
      span.className = 'msg-ref';
      span.innerHTML = '<span class="msg-ref-comp">' + r.component + '</span> ' + r.title + ' · ' + r.version;
      refsDiv.appendChild(span);
    });
    div.appendChild(refsDiv);
  }

  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function addThinking() {
  var msgs = document.getElementById('chat-messages');
  var div = document.createElement('div');
  div.className = 'chat-thinking';
  div.id = 'chat-thinking';
  div.innerHTML = 'Buscando en requerimientos <div class="dots"><span></span><span></span><span></span></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeThinking() {
  var t = document.getElementById('chat-thinking');
  if (t) t.remove();
}

async function sendChat() {
  var input = document.getElementById('chat-input');
  var question = input.value.trim();
  if (!question) return;

  var sendBtn = document.getElementById('chat-send');
  sendBtn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  addMsg('user', question);
  chatHistory.push({ role: 'user', content: question });
  addThinking();

  var app = document.getElementById('cf-app').value;
  var component = document.getElementById('cf-comp').value;
  var lastVersionOnly = document.getElementById('cf-last').checked;

  try {
    var resp = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question: question,
        app: app,
        component: component,
        lastVersionOnly: lastVersionOnly,
        history: chatHistory.slice(-6)
      })
    });
    var data = await resp.json();
    removeThinking();

    var answer = data.answer || 'No se pudo obtener respuesta.';
    addMsg('assistant', answer, data.references);
    chatHistory.push({ role: 'assistant', content: answer });

  } catch(e) {
    removeThinking();
    addMsg('assistant', 'Error al conectar con el servidor: ' + e.message);
  }

  sendBtn.disabled = false;
  input.focus();
}
</script>
</body>
</html>
